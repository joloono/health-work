services:
  health-system:
    build: .
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      - PORT=${PORT:-3001}
      - AUTH_USER=${AUTH_USER:-jo}
      - AUTH_PASS=${AUTH_PASS:-health2026}
      - DB_PATH=/app/data/health.db
    volumes:
      - health-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${PORT:-3001}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  health-data:
